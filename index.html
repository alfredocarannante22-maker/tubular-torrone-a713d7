<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Famiglia">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>Famiglia App</title>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="logo">👨‍👩‍👦</div>
  <h1>Famiglia App</h1>
  <p>Calendario, note e spese per la famiglia</p>
  <button class="btn-google" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Accedi con Google
  </button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <header>
    <h1 id="header-title">Calendario</h1>
    <img id="user-avatar" class="header-avatar" src="" alt="avatar" onclick="openProfile()">
  </header>

  <!-- CALENDARIO -->
  <section id="section-calendar" class="active">
    <div class="card">
      <div class="calendar-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <h2 id="cal-month-label"></h2>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>
    <div class="events-list">
      <h3 id="events-date-label">Oggi</h3>
      <div id="events-container"></div>
    </div>
  </section>

  <!-- NOTE -->
  <section id="section-notes">
    <div id="notes-container"></div>
  </section>

  <!-- SPESE -->
  <section id="section-expenses">
    <div class="expense-summary card" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); color:white; border:none;">
      <div class="total-label">Totale questo mese</div>
      <div class="total-amount" id="expenses-total">€0,00</div>
      <div class="total-month" id="expenses-month-label"></div>
    </div>
    <div class="expense-tabs">
      <button class="expense-tab active" onclick="filterExpenses('all', this)">Tutte</button>
      <button class="expense-tab" onclick="filterExpenses('recurring', this)">Ricorrenti</button>
      <button class="expense-tab" onclick="filterExpenses('one-time', this)">Una tantum</button>
    </div>
    <div id="expenses-container"></div>
  </section>

  <!-- BOTTOM NAV -->
  <nav>
    <button class="active" id="nav-calendar" onclick="switchSection('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Calendario
    </button>
    <button id="nav-notes" onclick="switchSection('notes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      Note
    </button>
    <button id="nav-expenses" onclick="switchSection('expenses')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
      Spese
    </button>
  </nav>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAddModal()">+</button>
</div>

<!-- MODAL EVENTO -->
<div class="modal-backdrop" id="modal-event">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-event-title">Nuovo Evento</h2>
    <div class="form-group">
      <label>Titolo</label>
      <input type="text" id="event-title-input" placeholder="Es. Visita medico">
    </div>
    <div class="form-group">
      <label>Data</label>
      <input type="date" id="event-date-input">
    </div>
    <div class="form-group">
      <label>Orario (opzionale)</label>
      <input type="time" id="event-time-input">
    </div>
    <div class="form-group">
      <label>Descrizione (opzionale)</label>
      <textarea id="event-desc-input" placeholder="Aggiungi dettagli..."></textarea>
    </div>
    <div class="form-group">
      <label>Colore</label>
      <div class="color-picker" id="event-color-picker"></div>
    </div>
    <button class="btn btn-primary" onclick="saveEvent()" style="margin-bottom:10px">Salva</button>
    <button class="btn btn-secondary" id="delete-event-btn" onclick="deleteEvent()" style="display:none; margin-bottom:10px">Elimina</button>
    <button class="btn btn-secondary" onclick="closeModal('modal-event')">Annulla</button>
  </div>
</div>

<!-- MODAL NOTA -->
<div class="modal-backdrop" id="modal-note">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-note-title">Nuova Nota</h2>
    <div class="form-group">
      <label>Titolo</label>
      <input type="text" id="note-title-input" placeholder="Titolo della nota">
    </div>
    <div class="form-group">
      <label>Testo</label>
      <textarea id="note-body-input" placeholder="Scrivi qui..." style="height:160px"></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveNote()" style="margin-bottom:10px">Salva</button>
    <button class="btn btn-secondary" id="delete-note-btn" onclick="deleteNote()" style="display:none; margin-bottom:10px">Elimina</button>
    <button class="btn btn-secondary" onclick="closeModal('modal-note')">Annulla</button>
  </div>
</div>

<!-- MODAL SPESA -->
<div class="modal-backdrop" id="modal-expense">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-expense-title">Nuova Spesa</h2>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="expense-name-input" placeholder="Es. Netflix, Affitto...">
    </div>
    <div class="form-group">
      <label>Importo (€)</label>
      <input type="number" id="expense-amount-input" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="expense-category-input">
        <option value="casa">🏠 Casa</option>
        <option value="cibo">🍕 Cibo</option>
        <option value="trasporti">🚗 Trasporti</option>
        <option value="salute">💊 Salute</option>
        <option value="svago">🎬 Svago</option>
        <option value="abbonamenti">📱 Abbonamenti</option>
        <option value="vestiti">👕 Vestiti</option>
        <option value="altro">📦 Altro</option>
      </select>
    </div>
    <div class="form-group">
      <label>Tipo</label>
      <select id="expense-type-input">
        <option value="one-time">Una tantum</option>
        <option value="recurring">Ricorrente (mensile)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Data</label>
      <input type="date" id="expense-date-input">
    </div>
    <div class="form-group">
      <label>Condivisa con moglie?</label>
      <select id="expense-shared-input">
        <option value="true">Sì, spesa condivisa</option>
        <option value="false">No, solo mia</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="saveExpense()" style="margin-bottom:10px">Salva</button>
    <button class="btn btn-secondary" id="delete-expense-btn" onclick="deleteExpense()" style="display:none; margin-bottom:10px">Elimina</button>
    <button class="btn btn-secondary" onclick="closeModal('modal-expense')">Annulla</button>
  </div>
</div>

<!-- MODAL PROFILO -->
<div class="modal-backdrop" id="modal-profile">
  <div class="modal">
    <div class="modal-handle"></div>
    <img id="profile-avatar-large" class="avatar-large" src="" alt="">
    <div class="profile-name" id="profile-name"></div>
    <div class="profile-email" id="profile-email"></div>
    <button class="btn btn-secondary" onclick="closeModal('modal-profile')" style="margin-bottom:10px">Chiudi</button>
    <button class="btn btn-danger" onclick="signOut()">Esci</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module" src="app.js"></script>
</body>
</html>
